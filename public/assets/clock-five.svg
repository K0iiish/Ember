<svg viewBox="0 0 47 47" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark circle background -->
  <circle cx="23.5" cy="23.5" r="23.5" fill="#22192d"/>
  <!-- Clock face outline -->
  <circle cx="23.5" cy="23.5" r="16" stroke="#D78EF4" stroke-width="1.5"/>
  <!-- Hour hand pointing to ~5 o'clock (150 degrees from 12) -->
  <line x1="23.5" y1="23.5" x2="30" y2="31" stroke="#D78EF4" stroke-width="2" stroke-linecap="round"/>
  <!-- Minute hand pointing to 12 -->
  <line x1="23.5" y1="23.5" x2="23.5" y2="11" stroke="#D78EF4" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="23.5" cy="23.5" r="2" fill="#D78EF4"/>
</svg>
